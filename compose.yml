services:
  postgres:
    image: postgres:16
    container_name: ecommerce-order-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - internal
      - public
    volumes:
      - pgdata_ecommerce_order:/var/lib/postgresql/data
    ports:
      - "5445:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  migrate:
    container_name: ecommerce-order-migrate
    depends_on:
      postgres:
          condition: service_healthy
    build:
      context: .
      target: build
    restart: "no"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
    networks:
      - internal
    command: npm run migration:run

  seed:
    container_name: ecommerce-order-seed
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    build:
      context: .
      target: build
    restart: "no"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
    networks:
      - internal
    command: npm run db:seed

  api:
    container_name: ecommerce-order-api
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: .
      target: prod-distroless
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "127.0.0.1:8080:3001"
    networks:
      - internal
      - public
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    ports:
      - "5673:5672"
      - "15673:15672"

volumes:
  pgdata_ecommerce_order:

networks:
  internal:
    internal: true
  public: {}
