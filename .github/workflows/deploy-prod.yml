name: Deploy to Production

on:
  workflow_run:
    workflows:
      - Build and Stage
    types:
      - completed

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  deploy-production:
    name: Deploy to Production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    environment:
      name: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          name: release-manifest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download production deploy files
        uses: actions/download-artifact@v4
        with:
          name: prod-deploy-files
          path: deploy
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: release-meta
        shell: powershell
        run: |
          $manifestPath = (Get-ChildItem -Filter 'release-manifest-*.json' | Select-Object -First 1).FullName
          if (-not $manifestPath) {
            throw 'Release manifest file was not downloaded.'
          }

          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $service = $manifest.services.'orders-api'
          $imageRef = $service.image
          $digest = $service.digest
          $repository = $imageRef -replace ':[^:]+$',''
          $digestRef = "$repository@$digest"

          "manifest_path=$manifestPath" >> $env:GITHUB_OUTPUT
          "commit_sha=$($manifest.commit)" >> $env:GITHUB_OUTPUT
          "image_ref=$imageRef" >> $env:GITHUB_OUTPUT
          "image_digest=$digest" >> $env:GITHUB_OUTPUT
          "image_repository=$repository" >> $env:GITHUB_OUTPUT
          "digest_ref=$digestRef" >> $env:GITHUB_OUTPUT

      - name: Show deployment metadata
        shell: powershell
        run: |
          echo "Environment: production"
          echo "Commit SHA: ${{ steps.release-meta.outputs.commit_sha }}"
          echo "Image ref: ${{ steps.release-meta.outputs.image_ref }}"
          echo "Image digest: ${{ steps.release-meta.outputs.image_digest }}"
          cat "${{ steps.release-meta.outputs.manifest_path }}"

      - name: Write production environment file
        shell: powershell
        run: |
          @'
          ${{ secrets.PRODUCTION_ENV_FILE }}
          '@ | Set-Content .env.production

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull immutable image
        shell: powershell
        run: docker pull "${{ steps.release-meta.outputs.digest_ref }}"

      - name: Deploy production stack
        shell: powershell
        env:
          APP_IMAGE: ${{ steps.release-meta.outputs.digest_ref }}
          COMPOSE_PROJECT_NAME: ecommerce-prod
        run: |
          docker compose --env-file .env.production -f deploy/compose.prod.yml up -d --remove-orphans

      - name: Production smoke check
        uses: actions/github-script@v7
        with:
          script: |
            const url = 'http://127.0.0.1:8081/api/docs';
            const maxAttempts = 24;
            const delayMs = 5000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                const response = await fetch(url);

                if (response.ok) {
                  core.info(`Production smoke check passed on attempt ${attempt}`);
                  return;
                }

                core.info(`Attempt ${attempt} returned HTTP ${response.status}`);
              } catch (error) {
                core.info(`Attempt ${attempt} failed: ${error.message}`);
              }

              await new Promise((resolve) => setTimeout(resolve, delayMs));
            }

            core.setFailed(`Production smoke check failed: ${url} did not return HTTP 200 in time.`);
