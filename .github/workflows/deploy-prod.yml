name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: self-hosted
    environment:
      name: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Resolve latest staged release
        id: stage-run
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'build-and-stage.yml',
              branch: 'develop',
              event: 'push',
              status: 'success',
              per_page: 1,
            });

            const run = runs.data.workflow_runs[0];

            if (!run) {
              core.setFailed('No successful Build and Stage run was found on develop.');
              return;
            }

            core.info(`Using staged release from run ${run.id} (${run.head_sha})`);
            core.setOutput('run_id', String(run.id));
            core.setOutput('head_sha', run.head_sha);

      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          name: release-manifest
          run-id: ${{ steps.stage-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download production deploy files
        uses: actions/download-artifact@v4
        with:
          name: prod-deploy-files
          path: deploy
          run-id: ${{ steps.stage-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: release-meta
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const manifestName = fs.readdirSync(process.cwd()).find((file) =>
              /^release-manifest-.*\.json$/.test(file)
            );

            if (!manifestName) {
              core.setFailed('Release manifest file was not downloaded.');
              return;
            }

            const manifestPath = path.join(process.cwd(), manifestName);
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const service = manifest.services['orders-api'];
            const imageRef = service.image;
            const digest = service.digest;
            const repository = imageRef.replace(/:[^:]+$/, '');
            const digestRef = `${repository}@${digest}`;

            core.setOutput('manifest_path', manifestPath);
            core.setOutput('commit_sha', manifest.commit);
            core.setOutput('image_ref', imageRef);
            core.setOutput('image_digest', digest);
            core.setOutput('image_repository', repository);
            core.setOutput('digest_ref', digestRef);

      - name: Show deployment metadata
        uses: actions/github-script@v7
        env:
          MANIFEST_PATH: ${{ steps.release-meta.outputs.manifest_path }}
          COMMIT_SHA: ${{ steps.release-meta.outputs.commit_sha }}
          IMAGE_REF: ${{ steps.release-meta.outputs.image_ref }}
          IMAGE_DIGEST: ${{ steps.release-meta.outputs.image_digest }}
        with:
          script: |
            const fs = require('fs');
            const manifest = fs.readFileSync(process.env.MANIFEST_PATH, 'utf8');
            core.info('Environment: production');
            core.info(`Commit SHA: ${process.env.COMMIT_SHA}`);
            core.info(`Image ref: ${process.env.IMAGE_REF}`);
            core.info(`Image digest: ${process.env.IMAGE_DIGEST}`);
            core.info(manifest);

      - name: Write production environment file
        uses: actions/github-script@v7
        env:
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('.env.production', process.env.PRODUCTION_ENV_FILE, 'utf8');

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull immutable image on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: docker pull "${{ steps.release-meta.outputs.digest_ref }}"

      - name: Pull immutable image on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash
        run: docker pull "${{ steps.release-meta.outputs.digest_ref }}"

      - name: Deploy production stack on Windows
        if: runner.os == 'Windows'
        shell: powershell
        env:
          APP_IMAGE: ${{ steps.release-meta.outputs.digest_ref }}
          COMPOSE_PROJECT_NAME: ecommerce-prod
        run: |
          docker compose --env-file .env.production -f deploy/compose.prod.yml up -d --remove-orphans

      - name: Deploy production stack on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          APP_IMAGE: ${{ steps.release-meta.outputs.digest_ref }}
          COMPOSE_PROJECT_NAME: ecommerce-prod
        run: |
          docker compose --env-file .env.production -f deploy/compose.prod.yml up -d --remove-orphans

      - name: Production smoke check
        uses: actions/github-script@v7
        with:
          script: |
            const url = 'http://127.0.0.1:8081/api/docs';
            const maxAttempts = 24;
            const delayMs = 5000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                const response = await fetch(url);

                if (response.ok) {
                  core.info(`Production smoke check passed on attempt ${attempt}`);
                  return;
                }

                core.info(`Attempt ${attempt} returned HTTP ${response.status}`);
              } catch (error) {
                core.info(`Attempt ${attempt} failed: ${error.message}`);
              }

              await new Promise((resolve) => setTimeout(resolve, delayMs));
            }

            core.setFailed(`Production smoke check failed: ${url} did not return HTTP 200 in time.`);
